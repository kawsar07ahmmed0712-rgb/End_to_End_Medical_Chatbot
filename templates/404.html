{% extends "base.html" %}

{% block content %}
  <section class="page-section error-section">
    <div class="container error-card" data-reveal>
      <p class="eyebrow">404</p>
      <h1>The page you requested is not available.</h1>
      <p class="lead">
        The link may be outdated, or the route does not exist in this
        application.
      </p>
      <div class="hero-actions">
        <a class="button button-primary" href="{{ url_for('index') }}">Back to Home</a>
        <a class="button button-secondary" href="{{ url_for('assistant') }}">
          Open Assistant
        </a>
      </div>
    </div>
  </section>
{% endblock %}
